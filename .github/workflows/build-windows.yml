name: Build Windows package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build EXE package
        shell: pwsh
        run: .\build-exe.ps1

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ModbusB2B-windows
          path: release/ModbusB2B.zip
